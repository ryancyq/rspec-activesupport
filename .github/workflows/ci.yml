name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 5'

permissions:
  contents: read

jobs:
  tests:
    name: "ActiveSupport ${{ matrix.activesupport-version }} / Ruby ${{ matrix.ruby-version }}"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.ruby-version == 'head' || matrix.activesupport-version == 'edge' }}
    env:
      BUNDLE_GEMFILE: "${{ github.workspace }}/gemfiles/activesupport_${{ matrix.activesupport-version }}.gemfile"
    strategy:
      fail-fast: false
      matrix:
        # Base: active ActiveSupport × compatible Rubies (no excludes needed)
        ruby-version:
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - "head"
        activesupport-version:
          - "7.1"
          - "7.2"
          - "8.0"
          - "8.1"
        include:
          # EOL AS 6.1 — supports Ruby >= 2.5; head excluded (mutex_m removed after 3.3)
          - { activesupport-version: "6.1", ruby-version: "2.5", rubygems: "3.3.27" }
          - { activesupport-version: "6.1", ruby-version: "2.6", rubygems: "3.3.27" }
          - { activesupport-version: "6.1", ruby-version: "2.7" }
          - { activesupport-version: "6.1", ruby-version: "3.0" }
          - { activesupport-version: "6.1", ruby-version: "3.1" }
          - { activesupport-version: "6.1", ruby-version: "3.2" }
          - { activesupport-version: "6.1", ruby-version: "3.3" }
          - { activesupport-version: "6.1", ruby-version: "3.4" }
          - { activesupport-version: "6.1", ruby-version: "4.0" }
          # EOL AS 7.0 — supports Ruby >= 2.7; head excluded (mutex_m removed after 3.3)
          - { activesupport-version: "7.0", ruby-version: "2.7" }
          - { activesupport-version: "7.0", ruby-version: "3.0" }
          - { activesupport-version: "7.0", ruby-version: "3.1" }
          - { activesupport-version: "7.0", ruby-version: "3.2" }
          - { activesupport-version: "7.0", ruby-version: "3.3" }
          - { activesupport-version: "7.0", ruby-version: "3.4" }
          - { activesupport-version: "7.0", ruby-version: "4.0" }
          # AS 7.1 also supports older Rubies
          - { activesupport-version: "7.1", ruby-version: "2.7" }
          - { activesupport-version: "7.1", ruby-version: "3.0" }
          - { activesupport-version: "7.1", ruby-version: "3.1" }
          # AS 7.2 minimum Ruby is 3.1
          - { activesupport-version: "7.2", ruby-version: "3.1" }
          # AS edge — bleeding edge
          - { activesupport-version: "edge", ruby-version: "3.3" }
          - { activesupport-version: "edge", ruby-version: "3.4" }
          - { activesupport-version: "edge", ruby-version: "4.0" }
          - { activesupport-version: "edge", ruby-version: "head" }
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

        # https://bundler.io/blog/2018/01/17/making-gem-development-a-little-better.html
      - run: rm Gemfile.lock
      - run: rm gemfiles/*.gemfile.lock

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          rubygems: ${{ matrix.rubygems || 'latest' }}
          bundler: latest
          bundler-cache: true

      - run: bundle exec rake spec
